services:
  - type: web
    name: beatsync-studio
    runtime: python
    rootDir: beatsync-studio
    pythonVersion: 3.10
    buildCommand: "pip install -r requirements.txt && pip install ../beatsync-core && pip install ../beatsync-midi"
    startCommand: "uvicorn beatsync_studio.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    health:
      path: /api/health
      checkIntervalSeconds: 10
